name: PR Validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Require approved issue and type label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Check linked issue reference
        run: |
          set -euo pipefail
          issue_number="$(printf '%s' "${PR_BODY:-}" \
            | grep -ioE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '[0-9]+' \
            | head -n1 || true)"
          if [ -z "${issue_number}" ]; then
            echo "::error::PR body must link an approved issue with Closes/Fixes/Resolves #<number>."
            exit 1
          fi
          echo "Linked issue: #${issue_number}"
          echo "ISSUE_NUMBER=${issue_number}" >>"${GITHUB_ENV}"

      - name: Check linked issue is approved
        run: |
          set -euo pipefail
          if ! gh issue view "${ISSUE_NUMBER}" --repo "${REPO}" --json state >/dev/null 2>&1; then
            echo "::error::Linked issue #${ISSUE_NUMBER} was not found in ${REPO}."
            exit 1
          fi
          labels="$(gh issue view "${ISSUE_NUMBER}" --repo "${REPO}" --json labels --jq '.labels[].name')"
          if ! printf '%s\n' "${labels}" | grep -qx 'status:approved'; then
            echo "::error::Linked issue #${ISSUE_NUMBER} must carry the status:approved label before merge."
            exit 1
          fi
          echo "Issue #${ISSUE_NUMBER} is approved."

      - name: Check exactly one type label
        run: |
          set -euo pipefail
          count="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json labels \
            --jq '[.labels[].name | select(startswith("type:"))] | length')"
          if [ "${count}" -ne 1 ]; then
            echo "::error::PR must carry exactly one type:* label (found ${count})."
            exit 1
          fi
          echo "Type label count OK: ${count}."
