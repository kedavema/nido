name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CORS_ORIGINS: http://localhost:8081
      DATABASE_URL: postgresql://nido:nido@localhost:5432/nido_ci
      FIREBASE_PROJECT_ID: nido-ci
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://nido:nido@localhost:5432/nido_ci
      EXPO_PUBLIC_API_URL: http://localhost:3000
      EXPO_PUBLIC_FIREBASE_API_KEY: nido-ci-public-api-key
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: nido-ci.firebaseapp.com
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: nido-ci
      EXPO_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 000000000000-nido-ci.apps.googleusercontent.com

    services:
      postgres:
        image: postgres:18.4-alpine3.24
        env:
          POSTGRES_DB: nido_ci
          POSTGRES_PASSWORD: nido
          POSTGRES_USER: nido
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username=nido --dbname=nido_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.13.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test PostgreSQL integration
        run: pnpm test:integration

      - name: Build workspaces
        run: pnpm build
